name: elvan_niril
description: "A new Flutter project for Elvan Niril."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  shared_preferences: ^2.2.3

  # State Management
  flutter_riverpod: ^3.3.2

  # UI / Presentation
  intl: any
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.3.0
  flutter_displaymode: ^0.7.0
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  share_plus: ^13.0.0
  syncfusion_flutter_pdfviewer: ^33.0.0
  device_info_plus: ^13.0.0
  image_picker: ^1.2.2

  # Local Database (Drift / SQLite)
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.5
  path: ^1.9.1
  web_smooth_scroll: ^2.0.0
  smooth_scroll_multiplatform: ^1.0.8
  window_manager: ^0.4.3
  permission_handler: 12.0.1

  # ── Firebase (stubs — configure with `flutterfire configure`) ──
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  firebase_remote_config: ^6.5.3

  sqlite3: any
  flutter_colorpicker: ^1.1.0
  cyclop: ^0.7.0

  # PDF Generation & Preview
  pdf: ^3.11.1
  printing: ^5.13.4
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  drift_dev: ^2.28.0

  # App Icon & Splash
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  fonts:
    - family: ElvanSans
      fonts:
        - asset: assets/fonts/ElvanSans-Regular.ttf
        - asset: assets/fonts/ElvanSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/ElvanSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ElvanSans-Bold.ttf
          weight: 700


