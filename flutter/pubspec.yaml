name: elvan_niril
description: "A new Flutter project for Elvan Niril."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  shared_preferences: ^2.2.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI / Presentation
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.3.0
  flutter_displaymode: ^0.7.0
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  share_plus: ^13.1.0
  syncfusion_flutter_pdfviewer: ^33.2.13+1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  fonts:
    - family: ElvanSans
      fonts:
        - asset: assets/fonts/ElvanSans-Regular.ttf
        - asset: assets/fonts/ElvanSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/ElvanSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ElvanSans-Bold.ttf
          weight: 700
