<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preload" href="/fonts/ElvanSans-Regular.woff" as="font" type="font/woff" crossorigin />
    <link rel="preload" href="/fonts/ElvanSans-Medium.woff" as="font" type="font/woff" crossorigin />
    <link rel="preload" href="/fonts/ElvanSans-SemiBold.woff" as="font" type="font/woff" crossorigin />
    <link rel="preload" href="/fonts/ElvanSans-Bold.woff" as="font" type="font/woff" crossorigin />
    <!--
      Content Security Policy. Defends the rich-text Terms / Notes / extra-section
      paths which inject sanitized HTML via DOMPurify. Even if the sanitizer config
      is ever loosened, the CSP locks scripts to same-origin so injected script
      tags can't execute, and connect-src is limited to localhost + Google
      services (only place we make outbound calls).
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'unsafe-inline' 'unsafe-eval' http://localhost:* https://accounts.google.com https://apis.google.com https://*.firebasedatabase.app;
      style-src   'self' 'unsafe-inline';
      font-src    'self' data:;
      img-src     'self' data: blob: https://*.googleusercontent.com;
      connect-src 'self' http://localhost:* wss://localhost:* https://accounts.google.com https://www.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebasedatabase.app https://*.firebasedatabase.app https://api.github.com https://nodejs.org https://raw.githubusercontent.com;
      frame-src   https://accounts.google.com;
      object-src  'none';
      base-uri    'self';
    " />

    <!-- Primary SEO -->
    <title>Elvan Niril</title>
    <meta name="description" content="Elvan Niril App" />
    <meta name="author" content="Elvan" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Elvan Niril" />
    <meta property="og:title" content="Elvan Niril" />
    <meta property="og:description" content="Elvan Niril App" />
    <meta property="og:image" content="/og-preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Elvan Niril" />
    <meta name="twitter:description" content="Elvan Niril App" />
    <meta name="twitter:image" content="/og-preview.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="data:," />
    <link rel="apple-touch-icon" href="/og-preview.png" />
    <meta name="apple-mobile-web-app-title" content="Elvan Niril" />
        
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme -->
    <meta name="theme-color" content="#1e40af" />


  </head>
